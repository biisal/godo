version: '3'

vars:
  APP_NAME: godo
  MAIN_PKG: ./cmd/godo
  BIN_DIR: bin

tasks:
  all:
    desc: Run lint, tests, and build
    cmds:
      - task: lint
      - task: test
      - task: build

  build:
    desc: Build the Go application
    cmds:
      - go build -o {{.BIN_DIR}}/{{.APP_NAME}} {{.MAIN_PKG}}

  build:dist:
    desc: Build for distribution
    cmds:
      - goreleaser build --snapshot --clean

  run:
    desc: Run the application
    cmds:
      - go run {{.MAIN_PKG}}

  lint:
    desc: Run linter only
    cmds:
      - golangci-lint run

  test:
    desc: Run tests (fail fast)
    cmds:
      - go test -failfast ./...

  test:verbose:
    desc: Run tests with verbose output (fail fast)
    cmds:
      - go test -v -failfast ./...

  test:list:
    desc: List all test functions
    cmds:
      - go test -list '.*' ./... 2>&1 | grep -E '^Test'

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy


  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}/
      - rm -rf dist/

  install:
    desc: Install the application
    cmds:
      - go install {{.MAIN_PKG}}

  release:
    desc: Create a release build
    cmds:
      - goreleaser release --clean

  deps:
    desc: Show Go dependencies
    cmds:
      - go mod graph

  version:
    desc: Show Go version
    cmds:
      - go version
